<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fff;
      color: #1a1a1a;
      font-size: 18px;
      line-height: 1.7;
      padding: 4rem 2rem;
    }
    @media print {
      body { padding: 0; font-size: 12pt; }
      .header { border-bottom: 2px solid #000; padding-bottom: 1.5rem; margin-bottom: 2rem; }
      h1 { font-size: 28pt !important; }
      h2 { font-size: 18pt !important; }
    }
    .container { max-width: 720px; margin: 0 auto; }
    .header { margin-bottom: 3rem; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.25rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: #0a0a0a;
    }
    .byline {
      font-size: 0.95rem;
      color: #555;
      font-weight: 500;
      border-top: 1px solid #e5e5e5;
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }
    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin: 2.5rem 0 1rem;
      color: #0a0a0a;
    }
    p { margin-bottom: 1.25rem; }
    ul, ol { margin: 1rem 0 1.25rem 1.5rem; }
    li { margin-bottom: 0.5rem; }
    strong { font-weight: 600; }
    em { font-style: italic; }
    hr {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 2.5rem 0;
    }
    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e5e5;
      font-size: 0.8rem;
      color: #888;
    }
    .specs {
      background: #f8f7f4;
      border: 1px solid #e5e5e5;
      padding: 1.25rem 1.5rem;
      margin-top: 2rem;
      font-size: 0.9rem;
    }
    .specs-title { font-weight: 600; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{TITLE}}</h1>
      <div class="byline">{{AUTHOR}}</div>
    </div>
    <div class="content">{{CONTENT}}</div>
    <div class="footer">
      SubMoa Content — Precision content production system
    </div>
  </div>
</body>
</html>
